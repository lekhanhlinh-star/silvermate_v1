<script data-purpose="pin-input-logic">    // Updated logic for individual PIN boxes
    const inputs = document.querySelectorAll('[data-purpose="enter-pin-module"] input');
    const connectBtn = document.getElementById('connectBtn');

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
        checkPinStatus();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    function checkPinStatus() {
      const pin = Array.from(inputs).map(i => i.value).join('');
      if (pin.length === 6) {
        connectBtn.classList.remove('opacity-80', 'cursor-not-allowed');
        connectBtn.classList.add('opacity-100', 'cursor-pointer', 'active:scale-95');
        connectBtn.style.backgroundColor = '#FF6B00';
      } else {
        connectBtn.classList.add('opacity-80', 'cursor-not-allowed');
        connectBtn.classList.remove('opacity-100', 'cursor-pointer', 'active:scale-95');
        connectBtn.style.backgroundColor = '#FF6B00'; // Keep color but low opacity
      }
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      alert('Generating code...');
    });</script>
